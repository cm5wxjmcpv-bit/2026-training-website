<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CDL Training - Test</title>
    <script src="config.js" defer></script>
    <script src="frontend-api.js" defer></script>
    <style>
      body {
        font-family: system-ui, Arial;
        padding: 24px;
        max-width: 900px;
        margin: 0 auto;
        background: #eef2f6;
      }
      .card {
        background: white;
        border: 1px solid #d8e0e8;
        border-radius: 16px;
        padding: 18px;
        margin: 14px 0;
      }
      .small {
        color: #555;
        font-size: 14px;
      }
      .question {
        border-bottom: 1px solid #eee;
        padding: 12px 0;
      }
      .option {
        display: block;
        margin: 8px 0;
      }
      button {
        padding: 12px 16px;
        border-radius: 10px;
        border: 0;
        background: #17324d;
        color: white;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <h2 id="testTitle">Test</h2>
    <div class="small" id="who"></div>
    <p><a href="modules.html">← Back to Modules</a></p>
    <div id="lock" class="card">Checking if test is unlocked…</div>
    <div id="test" class="card" style="display: none">
      <div class="small" id="testMeta"></div>
      <form id="quizForm"></form>
      <button id="submit" type="button">Submit</button
      ><button id="retake" type="button">Retake</button>
      <div id="result" style="margin-top: 12px"></div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const username = requireAuth();
        const classId = qs("classId") || DEFAULT_CLASS_ID;
        document.getElementById("who").textContent = `Signed in as ${username}`;
        let QUESTIONS = [],
          classInfo = {},
          status = {};
        const lock = document.getElementById("lock"),
          test = document.getElementById("test"),
          form = document.getElementById("quizForm"),
          result = document.getElementById("result");
        function render() {
          form.textContent = "";
          QUESTIONS.forEach((q, i) => {
            const w = document.createElement("div");
            w.className = "question";
            const p = document.createElement("p");
            const prefix = document.createElement("b");
            prefix.textContent = `Question ${i + 1}:`;
            p.append(prefix, " ", q.question || "");
            w.appendChild(p);
            [q.optionA, q.optionB, q.optionC, q.optionD].forEach((opt, j) => {
              if (!opt) return;
              const label = document.createElement("label");
              label.className = "option";
              const input = document.createElement("input");
              input.type = "radio";
              input.name = `q${i}`;
              input.value = String(j);
              label.append(input, " ", opt);
              w.appendChild(label);
            });
            form.appendChild(w);
          });
        }
        function selections() {
          return QUESTIONS.map((_, i) => {
            const x = form.querySelector(`input[name="q${i}"]:checked`);
            return x ? Number(x.value) : null;
          });
        }
        async function load() {
          const s = await apiGetStatus(username, classId);
          status = s;
          classInfo = s.classInfo || {};
          document.getElementById("testTitle").textContent =
            (classInfo.title || "Training") + " Final Test";
          if (!allModulesComplete(s)) {
            lock.textContent =
              "Locked. Finish all modules for this class first.";
            return;
          }
          const q = await apiListTestQuestions(classId, true);
          QUESTIONS = q.questions || [];
          document.getElementById("testMeta").textContent =
            `${QUESTIONS.length} questions · Multiple choice · Passing score: ${classInfo.passingScore || 80}%`;
          if (!QUESTIONS.length) {
            lock.textContent =
              "No active questions are configured for this class.";
            return;
          }
          render();
          lock.style.display = "none";
          test.style.display = "block";
        }
        document
          .getElementById("submit")
          .addEventListener("click", async () => {
            const selected = selections();
            const unanswered = selected.filter((v) => v === null).length;
            if (unanswered) {
              result.textContent = `Please answer all questions. ${unanswered} unanswered.`;
              return;
            }
            let correct = 0;
            QUESTIONS.forEach((q, i) => {
              if (selected[i] === Number(q.correctIndex)) correct++;
            });
            const score = Math.round((correct / QUESTIONS.length) * 100),
              passed = score >= Number(classInfo.passingScore || 80);
            result.textContent = "Logging score…";
            const res = await apiLogTest(username, passed, score, classId);
            if (!res.ok) {
              result.textContent = "Error logging: " + (res.error || "Unknown");
              return;
            }
            result.textContent = `${passed ? "Passed" : "Did not pass"}. Score: ${score}% (${correct}/${QUESTIONS.length}).`;
          });
        document.getElementById("retake").addEventListener("click", () => {
          render();
          result.textContent = "";
          scrollTo({ top: 0, behavior: "smooth" });
        });
        load().catch((err) => {
          console.error(err);
          lock.textContent = "Error loading test.";
        });
      });
    </script>
  </body>
</html>
