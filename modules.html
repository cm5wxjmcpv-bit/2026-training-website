<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Martinsville CDL Program - Modules</title><script src="config.js" defer></script><script src="frontend-api.js" defer></script><style>:root{--navy:#17324d;--navy-dark:#10263a;--green:#2f8f4e;--bg:#eef2f6;--card:#fff;--muted:#5b6570;--border:#d8e0e8;--shadow:0 10px 30px rgba(16,38,58,.10)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:#1f2937}.topbar{background:linear-gradient(135deg,var(--navy-dark),var(--navy));color:white;border-bottom:4px solid var(--green)}.topbar-inner,.page{max-width:1120px;margin:0 auto;padding:18px 20px}.topbar-inner{display:flex;justify-content:space-between;align-items:center}.btn,.open-btn{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer;text-decoration:none}.btn{background:rgba(255,255,255,.12);color:white}.open-btn{background:linear-gradient(135deg,var(--navy-dark),var(--navy));color:white;display:inline-flex}.hero,.card,.class-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:24px;margin:20px 0;border:1px solid rgba(23,50,77,.06)}h1,h2,h3,h4{color:var(--navy-dark);margin-top:0}.accent{width:90px;height:4px;background:var(--green);border-radius:999px;margin:12px 0}.small{color:var(--muted);font-size:14px;line-height:1.5}.modules-grid{display:grid;gap:14px}.module-card,.test-card{border:1px solid var(--border);border-radius:16px;padding:18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;background:#fff}.badge{border-radius:999px;padding:7px 11px;font-weight:800;font-size:13px}.badge-complete{background:#e8f5ec;color:var(--green)}.badge-not{background:#f3f4f6;color:#667085}.summary{display:flex;gap:10px;flex-wrap:wrap}.pill{border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:#f8fafc;color:var(--muted);font-weight:700}@media(max-width:700px){.module-card,.test-card{grid-template-columns:1fr}}</style></head><body><header class="topbar"><div class="topbar-inner"><div><h1 style="color:white;margin:0">Martinsville CDL Program</h1><div>ELDT Compliance Training</div></div><button class="btn" id="logoutBtn">Log out</button></div></header><main class="page"><section class="hero"><div class="small">Training Dashboard</div><h2>Your assigned training</h2><div class="accent"></div><p class="small">Review assigned classes, complete modules, and take each class-specific final test.</p><div id="who" style="font-weight:800;margin-top:12px"></div><div id="status" class="small">Loading…</div></section><div id="classes"></div></main><script>document.addEventListener("DOMContentLoaded",()=>{const username=requireAuth();document.getElementById("who").textContent=`Signed in as ${username}`;document.getElementById("logoutBtn").addEventListener("click",logout);const wrap=document.getElementById("classes");function renderClass(cls){const st=cls.status||{modules:[]};const modules=st.modules||[];const done=modules.filter(m=>m.complete).length;const allDone=modules.length>0&&done===modules.length;const card=document.createElement("section");card.className="class-card";card.innerHTML=`<h3>${cls.title}</h3><p class="small">${cls.description||""}</p><div class="summary"><span class="pill">${done} of ${modules.length} modules complete</span><span class="pill">Passing score: ${cls.passingScore||80}%</span><span class="pill">Required watch: ${Math.round(Number(cls.requiredWatchPercent||0.9)*100)}%</span></div><h4 style="margin-top:20px">Modules</h4><div class="modules-grid"></div><h4 style="margin-top:20px">Final Test</h4><div class="test-card"><div><b>Knowledge Test</b><div class="small">${allDone?"Unlocked":"Locked until all modules for this class are complete."}</div><div class="small">${st.testComplete?`Test complete. Score: ${st.testScore}%`:""}</div></div><div>${allDone?`<a class="open-btn" href="test.html?classId=${encodeURIComponent(cls.id)}">Take Test</a>`:`<span class="badge badge-not">Locked</span>`}</div></div>`;const grid=card.querySelector(".modules-grid");modules.forEach(m=>{const row=document.createElement("div");row.className="module-card";row.innerHTML=`<div><b>${m.title}</b><div class="summary" style="margin-top:10px"><span class="pill">Module ${m.id}</span><span class="pill">${Math.round(Number(m.requiredWatchPercent||cls.requiredWatchPercent||0.9)*100)}% required</span><span class="badge ${m.complete?"badge-complete":"badge-not"}">${m.complete?"Complete":"Not Complete"}</span></div></div><a class="open-btn" href="player.html?classId=${encodeURIComponent(cls.id)}&m=${encodeURIComponent(m.id)}">${m.complete?"Review Module":"Open Module"}</a>`;grid.appendChild(row);});wrap.appendChild(card);}async function load(){try{const data=await apiGetStudentDashboard(username);if(!data.ok)throw new Error(data.error||"Unknown");wrap.innerHTML="";(data.classes||[]).forEach(renderClass);document.getElementById("status").textContent=`${(data.classes||[]).length} assigned class(es) loaded.`;}catch(err){console.error(err);document.getElementById("status").textContent="Unable to load dashboard.";}}load();});</script></body></html>
