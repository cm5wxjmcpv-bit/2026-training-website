<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Martinsville CDL Program - Modules</title>
    <script src="config.js" defer></script>
    <script src="frontend-api.js" defer></script>
    <style>
      :root {
        --navy: #17324d;
        --navy-dark: #10263a;
        --green: #2f8f4e;
        --bg: #eef2f6;
        --card: #fff;
        --muted: #5b6570;
        --border: #d8e0e8;
        --shadow: 0 10px 30px rgba(16, 38, 58, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, Arial;
        background: var(--bg);
        color: #1f2937;
      }
      .topbar {
        background: linear-gradient(135deg, var(--navy-dark), var(--navy));
        color: white;
        border-bottom: 4px solid var(--green);
      }
      .topbar-inner,
      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 18px 20px;
      }
      .topbar-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .btn,
      .open-btn {
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
      }
      .btn {
        background: rgba(255, 255, 255, 0.12);
        color: white;
      }
      .open-btn {
        background: linear-gradient(135deg, var(--navy-dark), var(--navy));
        color: white;
        display: inline-flex;
      }
      .hero,
      .card,
      .class-card {
        background: var(--card);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 24px;
        margin: 20px 0;
        border: 1px solid rgba(23, 50, 77, 0.06);
      }
      h1,
      h2,
      h3,
      h4 {
        color: var(--navy-dark);
        margin-top: 0;
      }
      .accent {
        width: 90px;
        height: 4px;
        background: var(--green);
        border-radius: 999px;
        margin: 12px 0;
      }
      .small {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }
      .modules-grid {
        display: grid;
        gap: 14px;
      }
      .module-card,
      .test-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        background: #fff;
      }
      .badge {
        border-radius: 999px;
        padding: 7px 11px;
        font-weight: 800;
        font-size: 13px;
      }
      .badge-complete {
        background: #e8f5ec;
        color: var(--green);
      }
      .badge-not {
        background: #f3f4f6;
        color: #667085;
      }
      .summary {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 10px;
        background: #f8fafc;
        color: var(--muted);
        font-weight: 700;
      }
      @media (max-width: 700px) {
        .module-card,
        .test-card {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1 style="color: white; margin: 0">Martinsville CDL Program</h1>
          <div>ELDT Compliance Training</div>
        </div>
        <button class="btn" id="logoutBtn">Log out</button>
      </div>
    </header>
    <main class="page">
      <section class="hero">
        <div class="small">Training Dashboard</div>
        <h2>Your assigned training</h2>
        <div class="accent"></div>
        <p class="small">
          Review assigned classes, complete modules, and take each
          class-specific final test.
        </p>
        <div id="who" style="font-weight: 800; margin-top: 12px"></div>
        <div id="status" class="small">Loading…</div>
      </section>
      <div id="classes"></div>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const username = requireAuth();
        document.getElementById("who").textContent = `Signed in as ${username}`;
        document.getElementById("logoutBtn").addEventListener("click", logout);
        const wrap = document.getElementById("classes");
        function addText(tag, text, className) {
          const el = document.createElement(tag);
          if (className) el.className = className;
          el.textContent = text || "";
          return el;
        }
        function addPill(parent, text, className = "pill") {
          parent.appendChild(addText("span", text, className));
        }
        function watchPercent(value) {
          const n = Number(value || 0.9);
          return Math.round((n > 1 ? n / 100 : n) * 100);
        }
        function renderClass(cls) {
          const st = cls.status || { modules: [] };
          const modules = st.modules || [];
          const done = modules.filter((m) => m.complete).length;
          const allDone = modules.length > 0 && done === modules.length;
          const card = document.createElement("section");
          card.className = "class-card";
          card.appendChild(addText("h3", cls.title));
          card.appendChild(addText("p", cls.description || "", "small"));
          const summary = document.createElement("div");
          summary.className = "summary";
          addPill(summary, `${done} of ${modules.length} modules complete`);
          addPill(summary, `Passing score: ${cls.passingScore || 80}%`);
          addPill(
            summary,
            `Required watch: ${watchPercent(cls.requiredWatchPercent)}%`,
          );
          card.appendChild(summary);
          const modulesHeading = addText("h4", "Modules");
          modulesHeading.style.marginTop = "20px";
          card.appendChild(modulesHeading);
          const grid = document.createElement("div");
          grid.className = "modules-grid";
          card.appendChild(grid);
          modules.forEach((m) => {
            const row = document.createElement("div");
            row.className = "module-card";
            const details = document.createElement("div");
            const title = document.createElement("b");
            title.textContent = m.title || "";
            details.appendChild(title);
            const meta = document.createElement("div");
            meta.className = "summary";
            meta.style.marginTop = "10px";
            addPill(meta, `Module ${m.id}`);
            addPill(
              meta,
              `${watchPercent(m.requiredWatchPercent || cls.requiredWatchPercent)}% required`,
            );
            addPill(
              meta,
              m.complete ? "Complete" : "Not Complete",
              `badge ${m.complete ? "badge-complete" : "badge-not"}`,
            );
            details.appendChild(meta);
            const link = document.createElement("a");
            link.className = "open-btn";
            link.href = `player.html?classId=${encodeURIComponent(cls.id)}&m=${encodeURIComponent(m.id)}`;
            link.textContent = m.complete ? "Review Module" : "Open Module";
            row.append(details, link);
            grid.appendChild(row);
          });
          const testHeading = addText("h4", "Final Test");
          testHeading.style.marginTop = "20px";
          card.appendChild(testHeading);
          const testCard = document.createElement("div");
          testCard.className = "test-card";
          const testDetails = document.createElement("div");
          testDetails.appendChild(addText("b", "Knowledge Test"));
          testDetails.appendChild(
            addText(
              "div",
              allDone
                ? "Unlocked"
                : "Locked until all modules for this class are complete.",
              "small",
            ),
          );
          if (st.testComplete)
            testDetails.appendChild(
              addText("div", `Test complete. Score: ${st.testScore}%`, "small"),
            );
          const action = document.createElement("div");
          if (allDone) {
            const link = document.createElement("a");
            link.className = "open-btn";
            link.href = `test.html?classId=${encodeURIComponent(cls.id)}`;
            link.textContent = "Take Test";
            action.appendChild(link);
          } else {
            action.appendChild(addText("span", "Locked", "badge badge-not"));
          }
          testCard.append(testDetails, action);
          card.appendChild(testCard);
          wrap.appendChild(card);
        }
        async function load() {
          try {
            const data = await apiGetStudentDashboard(username);
            if (!data.ok) throw new Error(data.error || "Unknown");
            wrap.innerHTML = "";
            (data.classes || []).forEach(renderClass);
            document.getElementById("status").textContent =
              `${(data.classes || []).length} assigned class(es) loaded.`;
          } catch (err) {
            console.error(err);
            document.getElementById("status").textContent =
              "Unable to load dashboard.";
          }
        }
        load();
      });
    </script>
  </body>
</html>
