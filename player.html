<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Martinsville CDL Program - Player</title>
  <script src="config.js" defer></script>
  <script src="frontend-api.js" defer></script>

  <style>
    /* --- ORIGINAL STYLES UNCHANGED --- */
    :root{
      --navy:#17324d;
      --navy-dark:#10263a;
      --green:#2f8f4e;
      --bg:#eef2f6;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#5b6570;
      --border:#d8e0e8;
      --shadow:0 10px 30px rgba(16,38,58,.10);
      --radius:18px;
    }
    * { box-sizing:border-box; }
    body{
      margin:0;
      font-family:Inter, system-ui, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    /* (ALL YOUR CSS EXACTLY THE SAME — NOT TOUCHING IT) */
  </style>
</head>

<body>
  <!-- ===== YOUR ORIGINAL HTML (UNCHANGED) ===== -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-wrap">
        <div class="brand-logo">
          <img src="logo.png" alt="logo">
        </div>
        <div class="brand-text">
          <h1>Martinsville CDL Program</h1>
          <p>ELDT Compliance Training</p>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn-link" href="modules.html">Back to Modules</a>
        <button class="btn" onclick="logout()">Log out</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">Course Player</div>
      <h2 id="title">Module</h2>
      <div class="accent"></div>
      <div class="small" id="who"></div>

      <div class="meta-row">
        <span class="meta-pill" id="modulePill">Module</span>
        <span class="meta-pill">Required watch: 90%</span>
        <span class="meta-pill">Completion logged automatically</span>
      </div>
    </section>

    <section class="layout">
      <div class="video-card">
        <div class="video-shell">
          <div class="crop">
            <div id="player"></div>
          </div>

          <div class="player-footer">
            <div class="progress-head">
              <div class="progress-label">Viewing Progress</div>
              <div class="progress-text" id="progress">Loading…</div>
            </div>

            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="notice">
              <div id="done" class="small"></div>
            </div>
          </div>
        </div>
      </div>

      <aside class="side-card">
        <h3>Module Information</h3>
        <div class="accent"></div>

        <div class="info-list">
          <div class="info-item">
            <strong>Status</strong>
            <span id="statusText">In Progress</span>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
  document.addEventListener("DOMContentLoaded", () => {

  const username = requireAuth();
  document.getElementById("who").textContent = `Signed in as ${username}`;

  const moduleId = Number(qs("m"));
  const mod = MODULES.find(x => x.id === moduleId) || MODULES[0];

  document.getElementById("title").textContent = mod.title;
  document.getElementById("modulePill").textContent = `Module ${mod.id}`;

  let player;
  let duration = 0;
  let maxWatched = 0;
  let validPlaySeconds = 0;
  let logged = false;

  let progressTick = null;
  let guardTick = null;

  let lastWallTime = 0;

  // ✅ FIX ADDED HERE
  let lastUIUpdate = 0;
  const UI_UPDATE_INTERVAL = 500;

  function safeUpdateUI() {
    if (Date.now() - lastUIUpdate > UI_UPDATE_INTERVAL) {
      updateUI();
      lastUIUpdate = Date.now();
    }
  }

  function pct() {
    return duration ? maxWatched / duration : 0;
  }

  function updateUI() {
    const percent = Math.floor(pct() * 100);
    document.getElementById("progress").textContent = `Progress: ${percent}%`;
    document.getElementById("progressFill").style.width = percent + "%";
  }

  function progressLoop() {
    if (!player || !duration) return;

    let current = player.getCurrentTime();

    if (current > maxWatched) {
      maxWatched = current;
      validPlaySeconds++;
    }

    // ✅ FIX APPLIED HERE
    safeUpdateUI();
  }

  function detectAndCorrectSkip() {
    if (!player || !duration) return;

    let current = player.getCurrentTime();

    if (current > maxWatched + 1) {
      player.seekTo(maxWatched);
      safeUpdateUI();
    }
  }

  function startTimers() {
    progressTick = setInterval(progressLoop, 400);
    guardTick = setInterval(detectAndCorrectSkip, 150);
  }

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player("player", {
      videoId: mod.youtubeId,
      events: {
        onReady: () => {
          duration = player.getDuration();
          startTimers();
        }
      }
    });
  };

  });
  </script>

</body>
</html>
