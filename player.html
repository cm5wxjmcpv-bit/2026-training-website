<script>
document.addEventListener("DOMContentLoaded", () => {
const username = requireAuth();
document.getElementById("who").textContent = `Signed in as ${username}`;

const moduleId = Number(qs("m"));
const mod = MODULES.find(x => x.id === moduleId) || MODULES[0];
document.getElementById("title").textContent = mod.title;
document.getElementById("modulePill").textContent = `Module ${mod.id}`;

let player;
let duration = 0;
let maxWatched = 0;
let validPlaySeconds = 0;
let logged = false;

let progressTick = null;
let guardTick = null;

let lastWallTime = 0;
let lastPlayerTime = 0;
let suppressGuardUntil = 0;
let correctingSeek = false;

// ✅ NEW — UI THROTTLE
let lastUIUpdate = 0;
const UI_UPDATE_INTERVAL = 500;

const SEEK_TOLERANCE_SECONDS = 0.75;
const MAX_INTERVAL_SECONDS = 1.25;
const ACTIVE_TIME_BUFFER_SECONDS = 10;
const GUARD_INTERVAL_MS = 150;

function safeUpdateUI() {
  if (Date.now() - lastUIUpdate > UI_UPDATE_INTERVAL) {
    updateUI();
    lastUIUpdate = Date.now();
  }
}

function clamp(n, min, max) {
  return Math.min(Math.max(n, min), max);
}

function formatSeconds(sec) {
  sec = Math.max(0, Math.floor(sec || 0));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;

  if (h > 0) {
    return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }
  return `${m}:${String(s).padStart(2, "0")}`;
}

function pct() {
  if (!duration) return 0;
  return maxWatched / duration;
}

function requiredWatchPercent() {
  return REQUIRED_WATCH_PERCENT || 0.9;
}

function requiredActiveSeconds() {
  if (!duration) return 0;
  const byPercent = duration * requiredWatchPercent();
  const minusTen = Math.max(0, duration - ACTIVE_TIME_BUFFER_SECONDS);
  return Math.min(byPercent, minusTen);
}

function completionReady() {
  return pct() >= requiredWatchPercent() && validPlaySeconds >= requiredActiveSeconds();
}

function isVisibleForCredit() {
  return document.visibilityState === "visible" && document.hasFocus();
}

function updateUI() {
  const watchedPercent = Math.floor(pct() * 100);
  const requiredPercent = Math.floor(requiredWatchPercent() * 100);
  const activeRequired = requiredActiveSeconds();

  document.getElementById("ruleText").textContent =
    `${requiredPercent}% minimum viewing threshold + active viewing time`;

  document.getElementById("progress").textContent =
    `Progress: ${watchedPercent}% · Active time: ${formatSeconds(validPlaySeconds)} / ${formatSeconds(activeRequired)}`;

  document.getElementById("progressFill").style.width = `${watchedPercent}%`;

  if (logged) {
    document.getElementById("statusText").textContent = "Complete";
    return;
  }

  document.getElementById("statusText").textContent =
    completionReady() ? "Eligible for Completion" : "In Progress";

  if (!completionReady()) {
    document.getElementById("done").innerHTML =
      `Watch at least ${requiredPercent}% and keep the video actively playing for ${formatSeconds(activeRequired)}.`;
  }
}

function progressLoop() {
  if (!player || !duration || logged) return;

  const now = Date.now();
  let elapsed = (now - lastWallTime) / 1000;
  lastWallTime = now;
  elapsed = clamp(elapsed, 0, MAX_INTERVAL_SECONDS);

  let state = -1;
  let currentTime = 0;

  try {
    state = player.getPlayerState();
    currentTime = clamp(player.getCurrentTime() || 0, 0, duration);
  } catch {
    return;
  }

  if (state === YT.PlayerState.PLAYING) {
    if (currentTime > maxWatched) {
      maxWatched = currentTime;
    }

    if (isVisibleForCredit()) {
      validPlaySeconds = Math.min(duration, validPlaySeconds + elapsed);
    }
  }

  lastPlayerTime = currentTime;

  // ✅ FIXED
  safeUpdateUI();
}

function detectAndCorrectSkip() {
  if (!player || !duration || logged) return;

  let currentTime = 0;
  try {
    currentTime = clamp(player.getCurrentTime() || 0, 0, duration);
  } catch {
    return;
  }

  if (currentTime > maxWatched + SEEK_TOLERANCE_SECONDS) {
    player.seekTo(maxWatched, true);
    safeUpdateUI();
  }
}

function startTimers() {
  stopTimers();
  lastWallTime = Date.now();

  // ✅ Slightly slower (safer rendering)
  progressTick = setInterval(progressLoop, 400);
  guardTick = setInterval(detectAndCorrectSkip, GUARD_INTERVAL_MS);
}

function stopTimers() {
  if (progressTick) clearInterval(progressTick);
  if (guardTick) clearInterval(guardTick);
}

window.onYouTubeIframeAPIReady = function () {
  player = new YT.Player("player", {
    videoId: mod.youtubeId,
    playerVars: {
      controls: 1,
      disablekb: 1,
      fs: 1,
      rel: 0,
      modestbranding: 1,
      playsinline: 1
    },
    events: {
      onReady: () => {
        duration = player.getDuration() || 0;
        lastWallTime = Date.now();
        safeUpdateUI();
        startTimers();
      }
    }
  });
};
});
</script>
